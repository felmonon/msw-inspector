name: Feature request
description: Propose a focused improvement for real MSW coverage workflows.
title: "Feature: "
labels:
  - enhancement
  - "status: needs triage"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What MSW drift or CI workflow problem does this solve?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example
      description: Show a small handler, API call, config, or GitHub Action example.
      render: ts
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest behavior change that would solve this.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - scanner
        - CLI
        - GitHub Action
        - docs
        - not sure
    validations:
      required: true

name: Bug report
description: Report incorrect coverage, a crash, or broken CLI or Action behavior.
title: "Bug: "
labels:
  - bug
  - "status: needs reproduction"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please reduce private app code to a minimal example before posting.
  - type: input
    id: version
    attributes:
      label: msw-inspector version
      description: Run `npx msw-inspector --version` or check your package-lock.
      placeholder: 0.1.4
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 20.11.1
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command or GitHub Action step.
      render: bash
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest handler and API-call examples that reproduce the issue.
      render: ts
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include relevant CLI output or report JSON.
    validations:
      required: true

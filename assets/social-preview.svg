<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#101724"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- left: name + tagline -->
  <text x="88" y="180" font-family="Menlo, SF Mono, monospace" font-size="58" font-weight="bold" fill="#e6edf3">msw-inspector</text>
  <rect x="90" y="204" width="360" height="5" rx="2.5" fill="#3fb950"/>

  <text x="88" y="272" font-family="Menlo, SF Mono, monospace" font-size="27" fill="#8b949e">Find gaps in your API mock</text>
  <text x="88" y="312" font-family="Menlo, SF Mono, monospace" font-size="27" fill="#8b949e">coverage before they reach CI.</text>

  <text x="88" y="410" font-family="Menlo, SF Mono, monospace" font-size="22" fill="#58a6ff">$ npx msw-inspector</text>

  <text x="88" y="560" font-family="Menlo, SF Mono, monospace" font-size="20" fill="#484f58">github.com/felmonon/msw-inspector</text>

  <!-- right: terminal panel -->
  <g>
    <rect x="640" y="96" width="556" height="448" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <!-- traffic lights -->
    <circle cx="674" cy="130" r="7" fill="#ff5f56"/>
    <circle cx="698" cy="130" r="7" fill="#ffbd2e"/>
    <circle cx="722" cy="130" r="7" fill="#27c93f"/>

    <g font-family="Menlo, SF Mono, monospace" font-size="21">
      <text x="674" y="188"><tspan fill="#3fb950">&#10003;</tspan><tspan fill="#e6edf3" dx="12">23 handlers found</tspan></text>
      <text x="674" y="222"><tspan fill="#3fb950">&#10003;</tspan><tspan fill="#e6edf3" dx="12">31 API calls found</tspan></text>
      <text x="674" y="256"><tspan fill="#f85149">&#10007;</tspan><tspan fill="#e6edf3" dx="12">8 unmocked endpoints</tspan></text>
      <text x="674" y="290"><tspan fill="#f85149">&#10007;</tspan><tspan fill="#e6edf3" dx="12">3 stale mocks</tspan></text>
      <text x="674" y="324"><tspan fill="#d29922">&#9676;</tspan><tspan fill="#e6edf3" dx="12">1 ambiguous call</tspan></text>

      <text x="674" y="378" fill="#8b949e">Unmocked API calls:</text>
      <text x="690" y="410" fill="#e6edf3">POST /api/chat  <tspan fill="#484f58">src/chat.ts:12</tspan></text>
      <text x="690" y="442" fill="#e6edf3">GET /api/user   <tspan fill="#484f58">src/user.ts:33</tspan></text>

      <text x="674" y="502" font-weight="bold"><tspan fill="#f85149">&#10007; 74% mock coverage &#8212; 8 unmocked calls</tspan></text>
    </g>
  </g>
</svg>
